<div class="wheel">
  <svg viewBox="0 0 1000 1000" role="img"
       aria-label="World Cup 2026 knockout bracket: outer ring 32 teams, second ring the 16 Round of 16 teams, third ring 8 quarterfinal slots, fourth ring 4 semifinal slots, inner ring 2 final slots, trophy at the center">
    <defs>
      <radialGradient id="medallion" cx="50%" cy="40%" r="65%">
        <stop offset="0%" stop-color="#222c44" />
        <stop offset="100%" stop-color="#0c1019" />
      </radialGradient>
      <clipPath id="clipNode"><circle r="26" /></clipPath>
      <clipPath id="clipTrophy"><circle cx="500" cy="500" r="51" /></clipPath>
    </defs>

    <!-- ring guides (transparent background) -->
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rOuter" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rR16" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rQf" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rSf" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rF" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />

    <!-- Semifinal → Final links -->
    <g class="links">
      @for (l of finalLinks(); track $index) {
        <path [attr.d]="l.d" class="link future" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- Quarterfinal → Semifinal links -->
    <g class="links">
      @for (l of sfLinks(); track $index) {
        <path [attr.d]="l.d" class="link future" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- R16 → Quarterfinal links -->
    <g class="links">
      @for (l of qfLinks(); track $index) {
        <path [attr.d]="l.d" class="link future" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- R32 → R16 links -->
    <g class="links">
      @for (l of r16Links(); track $index) {
        <path [attr.d]="l.d" class="link future" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- match links between the two opponents (R16 ring) -->
    <g class="links">
      @for (l of r16MatchLinks(); track l.matchId) {
        <path [attr.d]="l.d" class="match-link" [class.next]="l.next" [class.live]="l.live"
              [class.active]="hovered() === l.matchId" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- match links between the two opponents (outer ring) -->
    <g class="links">
      @for (l of matchLinks(); track l.matchId) {
        <path [attr.d]="l.d" class="match-link" [class.next]="l.next" [class.live]="l.live"
              [class.active]="hovered() === l.matchId" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- Center ring: 2 Final slots (Semifinal winners once decided) -->
    <g class="ring final">
      @for (n of finalNodes(); track n.matchId) {
        <g class="node" [class.tbd]="!n.team" [class.dim]="isDimmed(n.matchId, n.altId)"
           [class.next]="n.next" [class.live]="n.live"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          @if (n.team; as team) {
            <circle [attr.r]="nodeR" class="bg" [class.advancing]="n.advancing" />
            <image [attr.href]="flagUrl(team)" x="-36" y="-27" width="72" height="54"
                   preserveAspectRatio="xMidYMid meet" clip-path="url(#clipNode)" />
            <circle [attr.r]="nodeR" class="stroke" [class.advancing]="n.advancing" />
            <text class="code" [attr.y]="nodeR + 13" text-anchor="middle">{{ team.code }}</text>
          } @else {
            <circle [attr.r]="nodeR" class="bg" />
            <text class="qmark" y="1" text-anchor="middle">?</text>
          }
        </g>
      }
    </g>

    <!-- Semifinal ring: 4 slots (Quarterfinal winners once decided) -->
    <g class="ring sf">
      @for (n of sfNodes(); track n.matchId) {
        <g class="node" [class.tbd]="!n.team" [class.dim]="isDimmed(n.matchId, n.altId)"
           [class.next]="n.next" [class.live]="n.live"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          @if (n.team; as team) {
            <circle [attr.r]="nodeR" class="bg" [class.advancing]="n.advancing" />
            <image [attr.href]="flagUrl(team)" x="-36" y="-27" width="72" height="54"
                   preserveAspectRatio="xMidYMid meet" clip-path="url(#clipNode)" />
            <circle [attr.r]="nodeR" class="stroke" [class.advancing]="n.advancing" />
            <text class="code" [attr.y]="nodeR + 13" text-anchor="middle">{{ team.code }}</text>
          } @else {
            <circle [attr.r]="nodeR" class="bg" />
            <text class="qmark" y="1" text-anchor="middle">?</text>
          }
        </g>
      }
    </g>

    <!-- Quarterfinal ring: 8 slots (R16 winners once decided) -->
    <g class="ring qf">
      @for (n of qfNodes(); track n.matchId) {
        <g class="node" [class.tbd]="!n.team" [class.dim]="isDimmed(n.matchId, n.altId)"
           [class.next]="n.next" [class.live]="n.live"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          @if (n.team; as team) {
            <circle [attr.r]="nodeR" class="bg" [class.advancing]="n.advancing" />
            <image [attr.href]="flagUrl(team)" x="-36" y="-27" width="72" height="54"
                   preserveAspectRatio="xMidYMid meet" clip-path="url(#clipNode)" />
            <circle [attr.r]="nodeR" class="stroke" [class.advancing]="n.advancing" />
            <text class="code" [attr.y]="nodeR + 13" text-anchor="middle">{{ team.code }}</text>
          } @else {
            <circle [attr.r]="nodeR" class="bg" />
            <text class="qmark" y="1" text-anchor="middle">?</text>
          }
        </g>
      }
    </g>

    <!-- Middle ring: 16 teams (Round of 16 matches) -->
    <g class="ring r16">
      @for (n of r16Nodes(); track n.matchId + '-' + n.team!.code) {
        <g class="node" [class.dim]="isDimmed(n.matchId, n.altId)" [class.next]="n.next" [class.live]="n.live"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          <circle [attr.r]="nodeR" class="bg" [class.advancing]="n.advancing"
                  [class.eliminated]="n.decided && !n.advancing" />
          <image [attr.href]="flagUrl(n.team!)" x="-36" y="-27" width="72" height="54"
                 preserveAspectRatio="xMidYMid meet" clip-path="url(#clipNode)"
                 [class.eliminated]="n.decided && !n.advancing" />
          <circle [attr.r]="nodeR" class="stroke" [class.advancing]="n.advancing"
                  [class.eliminated]="n.decided && !n.advancing" />
        </g>
      }
    </g>

    <!-- Outer ring: 32 teams (Round of 32) — flags only, names via tooltip -->
    <g class="ring outer">
      @for (n of outerNodes(); track n.matchId + '-' + n.team!.code) {
        <g class="node" [class.dim]="isDimmed(n.matchId, n.altId)" [class.next]="n.next" [class.live]="n.live"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          <circle [attr.r]="nodeR" class="bg" [class.advancing]="n.advancing"
                  [class.eliminated]="n.decided && !n.advancing" />
          <image [attr.href]="flagUrl(n.team!)" x="-36" y="-27" width="72" height="54"
                 preserveAspectRatio="xMidYMid meet" clip-path="url(#clipNode)"
                 [class.eliminated]="n.decided && !n.advancing" />
          <circle [attr.r]="nodeR" class="stroke" [class.advancing]="n.advancing"
                  [class.eliminated]="n.decided && !n.advancing" />
        </g>
      }
    </g>

    <!-- Center medallion + real trophy photo -->
    <g class="center">
      <circle [attr.cx]="cx" [attr.cy]="cy" r="52" fill="url(#medallion)" />
      <image class="trophy" href="wc-emblem.svg" x="464.8" y="442" width="71" height="110"
             preserveAspectRatio="xMidYMid meet" clip-path="url(#clipTrophy)" />
      <circle [attr.cx]="cx" [attr.cy]="cy" r="52" fill="none" stroke="#caa23c" stroke-width="2.5" />
    </g>
  </svg>
</div>
