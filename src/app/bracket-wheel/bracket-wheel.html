<div class="wheel">
  <svg viewBox="0 0 1000 1000" role="img"
       aria-label="World Cup 2026 knockout bracket: outer ring 32 teams, second ring the 16 Round of 16 teams, third ring 8 quarterfinal slots, inner ring 4 semifinal slots, trophy at the center">
    <defs>
      <radialGradient id="medallion" cx="50%" cy="40%" r="65%">
        <stop offset="0%" stop-color="#222c44" />
        <stop offset="100%" stop-color="#0c1019" />
      </radialGradient>
      <clipPath id="clipOuter"><circle r="30" /></clipPath>
      <clipPath id="clipR16"><circle r="27" /></clipPath>
      <clipPath id="clipQf"><circle r="24" /></clipPath>
      <clipPath id="clipTrophy"><circle cx="500" cy="500" r="61" /></clipPath>
    </defs>

    <!-- ring guides (transparent background) -->
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rOuter" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rR16" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rQf" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />
    <circle [attr.cx]="cx" [attr.cy]="cy" [attr.r]="rSf" fill="none" stroke="#222b3d" stroke-width="1" stroke-dasharray="1 7" />

    <!-- Quarterfinal → Semifinal links -->
    <g class="links">
      @for (l of sfLinks(); track $index) {
        <path [attr.d]="l.d" class="link future" />
      }
    </g>

    <!-- R16 → Quarterfinal links -->
    <g class="links">
      @for (l of qfLinks(); track $index) {
        <path [attr.d]="l.d" class="link" [class.decided]="l.decided"
              [class.future]="!l.decided" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- R32 → R16 links -->
    <g class="links">
      @for (l of r16Links(); track l.matchId) {
        <path [attr.d]="l.d" class="link" [class.decided]="l.decided"
              [class.future]="!l.decided" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- match links between the two opponents (R16 ring) -->
    <g class="links">
      @for (l of r16MatchLinks(); track l.matchId) {
        <path [attr.d]="l.d" class="match-link" [class.next]="l.next"
              [class.active]="hovered() === l.matchId" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- match links between the two opponents (outer ring) -->
    <g class="links">
      @for (l of matchLinks(); track l.matchId) {
        <path [attr.d]="l.d" class="match-link" [class.next]="l.next"
              [class.active]="hovered() === l.matchId" [class.dim]="isDimmed(l.matchId, l.altId)" />
      }
    </g>

    <!-- Innermost ring: 4 Semifinal slots (TBD) -->
    <g class="ring sf">
      @for (n of sfNodes(); track $index) {
        <g class="node tbd" [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          <circle [attr.r]="sizeSf" class="bg" />
          <text class="qmark" y="1" text-anchor="middle">?</text>
        </g>
      }
    </g>

    <!-- Quarterfinal ring: 8 slots (R16 winners once decided) -->
    <g class="ring qf">
      @for (n of qfNodes(); track n.matchId) {
        <g class="node" [class.tbd]="!n.team" [class.dim]="isDimmed(n.matchId, n.altId)"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          @if (n.team; as team) {
            <circle [attr.r]="sizeQf" class="bg" [class.advancing]="n.advancing" />
            <image [attr.href]="flagUrl(team)" x="-33" y="-25" width="66" height="50"
                   preserveAspectRatio="xMidYMid meet" clip-path="url(#clipQf)" />
            <circle [attr.r]="sizeQf" class="stroke" [class.advancing]="n.advancing" />
            <text class="code" [attr.y]="sizeQf + 13" text-anchor="middle">{{ team.code }}</text>
          } @else {
            <circle [attr.r]="sizeQf" class="bg" />
            <text class="qmark" y="1" text-anchor="middle">?</text>
          }
        </g>
      }
    </g>

    <!-- Middle ring: 16 teams (Round of 16 matches) -->
    <g class="ring r16">
      @for (n of r16Nodes(); track n.matchId + '-' + n.team!.code) {
        <g class="node" [class.dim]="isDimmed(n.matchId, n.altId)" [class.next]="n.next"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          <circle [attr.r]="sizeR16" class="bg" [class.advancing]="n.advancing" />
          <image [attr.href]="flagUrl(n.team!)" x="-37.5" y="-28" width="75" height="56"
                 preserveAspectRatio="xMidYMid meet" clip-path="url(#clipR16)" />
          <circle [attr.r]="sizeR16" class="stroke" [class.advancing]="n.advancing"
                  [class.eliminated]="n.decided && !n.advancing" />
          <text class="code" [attr.y]="sizeR16 + 14" text-anchor="middle">{{ n.team!.code }}</text>
        </g>
      }
    </g>

    <!-- Outer ring: 32 teams (Round of 32) — flags only, names via tooltip -->
    <g class="ring outer">
      @for (n of outerNodes(); track n.matchId + '-' + n.team!.code) {
        <g class="node" [class.dim]="isDimmed(n.matchId, n.altId)" [class.next]="n.next"
           (mouseenter)="onEnter(n.matchId)" (mouseleave)="onLeave()"
           [attr.transform]="'translate(' + n.x + ',' + n.y + ')'">
          <title>{{ n.tip }}</title>
          <circle [attr.r]="sizeOuter" class="bg" [class.advancing]="n.advancing" />
          <image [attr.href]="flagUrl(n.team!)" x="-41.5" y="-31" width="83" height="62"
                 preserveAspectRatio="xMidYMid meet" clip-path="url(#clipOuter)" />
          <circle [attr.r]="sizeOuter" class="stroke" [class.advancing]="n.advancing"
                  [class.eliminated]="n.decided && !n.advancing" />
        </g>
      }
    </g>

    <!-- Center medallion + real trophy photo -->
    <g class="center">
      <circle [attr.cx]="cx" [attr.cy]="cy" r="62" fill="url(#medallion)" />
      <image class="trophy" href="wc-emblem.svg" x="458.3" y="431.5" width="84" height="131"
             preserveAspectRatio="xMidYMid meet" clip-path="url(#clipTrophy)" />
      <circle [attr.cx]="cx" [attr.cy]="cy" r="62" fill="none" stroke="#caa23c" stroke-width="2.5" />
    </g>
  </svg>
</div>
